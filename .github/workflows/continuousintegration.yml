name: Continuous Integration and Delivery
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        
      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Rodar o Pylint
        run: pylint src/monitor_api.py

  test:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        
      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Instalar dependências de Teste
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx
          
      - name: Rodar Testes Unitários com Pytest
        run: python -m pytest test/ -v

  deliver:
    needs: test 
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        
      - name: Simulando Continuous Delivery
        uses: actions/upload-artifact@v4
        with:
          name: projetozipado.zip
          path: |
            **.py
            README.md

  deploy:
    needs: deliver
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: projetozipado.zip
      - name: Display structure of downloaded files
        run: ls -R

  docker:
    needs: deliver
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: dubusatto/monitor-api:latest

  discord_notification:
    needs: docker
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Enviar notificacao nativa para o Discord
        run: |
          curl -H "Content-Type: application/json" \
          -d '{
            "content": "**Deploy de Sucesso!**\n\nUma nova versão da API de monitoramento foi enviada para o Docker Hub com sucesso.\n\n**Autor:** `${{ github.actor }}`\n**Ver as mudanças (Commit):** https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          }' \
          ${{ secrets.DISCORD_WEBHOOK }}

  telegram_notification:
    needs: docker
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Enviar notificacao via Action do Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            Deploy de Sucesso!
            
            Uma nova versão da API de monitoramento foi enviada para o Docker Hub com sucesso.
            
            Autor: ${{ github.actor }}
            Ver as mudanças: https://github.com/${{ github.repository }}/commit/${{ github.sha }}